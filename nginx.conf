server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect www to non-www
    if ($host = "www.base64image.net") {
        return 301 https://base64image.net$request_uri;
    }

    # Force HTTPS (Coolify handles SSL termination)
    # If you're using Coolify's SSL, this header will be set
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Note: HSTS removed to avoid subdomain certificate issues
    # Coolify handles HTTPS redirect at the proxy level

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache HTML files for shorter time
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Serve robots.txt and sitemap.xml directly
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type application/xml;
    }

    # Main location block - Clean URLs
    location / {
        # Try the exact file, then directory index, then .html extension, then 404
        try_files $uri $uri/index.html $uri.html /index.html =404;
    }

    # Remove .html from URLs
    if ($request_uri ~ ^/(.*)\.html(\?|$)) {
        return 301 /$1$2;
    }

    # Remove index.html from URLs
    if ($request_uri ~ ^/(.*)/index\.html(\?|$)) {
        return 301 /$1/$2;
    }

    # Remove trailing /index from URLs
    if ($request_uri ~ ^/(.*)/index(\?|$)) {
        return 301 /$1/$2;
    }

    # 404 error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
